name: Build

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    container: rust:1.95

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Restore Cargo cache
        uses: actions/cache@v5
        with:
          path: |
            target
            /usr/local/cargo/registry
            /usr/local/cargo/git
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Test
        run: cargo test --locked

  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis

      - name: Install Rust toolchain
        run: |
          rustup toolchain install 1.95.0 --profile minimal --component llvm-tools-preview
          rustup default 1.95.0

      - name: Restore cargo-llvm-cov binary cache
        id: cargo-llvm-cov-cache
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-llvm-cov
          key: cargo-llvm-cov-${{ runner.os }}-rust-1.95-v1

      - name: Install cargo-llvm-cov
        if: steps.cargo-llvm-cov-cache.outputs.cache-hit != 'true'
        run: |
          cargo install cargo-llvm-cov --locked

      - name: Show cargo-llvm-cov version
        run: cargo llvm-cov --version

      - name: Generate Rust coverage
        run: |
          mkdir -p coverage
          cargo llvm-cov --locked --all-targets --lcov --output-path coverage/lcov.info

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
