name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    container: rust:1.95

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Restore Cargo cache
        uses: actions/cache@v5
        with:
          path: |
            target
            /usr/local/cargo/registry
            /usr/local/cargo/git
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Test
        run: cargo test --locked
